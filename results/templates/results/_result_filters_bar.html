{% load static %}
<div class="mb-3 d-flex gap-2 align-items-center flex-wrap">
  <div class="position-relative" style="max-width:320px;flex:1">
    <span class="position-absolute top-50 translate-middle-y ms-2 ps-1 text-muted" style="pointer-events:none;">
      <img src="{% static 'results/img/search.svg' %}" width="16" height="16" alt="">
    </span>
    <input type="text" id="runnerSearch" class="form-control ps-5" placeholder="{{ search_placeholder }}">
  </div>
  <button class="btn btn-outline-secondary btn-sm" onclick="toggleNonFinishers()">
    <i class="bi bi-eye me-1"></i><span id="toggleLabel">Masquer abandons</span>
  </button>
  {% if has_splits %}
  <button class="btn btn-outline-primary btn-sm" onclick="toggleAllSplits()">
    <i class="bi bi-clock-history me-1"></i><span id="allSplitsLabel">Développer tous les intermédiaires</span>
  </button>
  <div class="d-flex align-items-center gap-2 ms-2 flex-wrap" id="errorThresholds">
    <span class="small text-muted fw-bold">Seuil erreur :</span>
    <div class="input-group input-group-sm" style="width:110px">
      <input type="number" id="thresholdSec" class="form-control form-control-sm" value="30" min="0" step="5" title="Seuil en secondes">
      <span class="input-group-text">s</span>
    </div>
    <div class="input-group input-group-sm" style="width:90px">
      <input type="number" id="thresholdPct" class="form-control form-control-sm" value="10" min="0" step="1" title="Seuil en pourcent">
      <span class="input-group-text">%</span>
    </div>
  </div>
  {% endif %}
</div>
